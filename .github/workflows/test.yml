name: Node.js CI

# Trigger the workflow on pushes or pull requests to the main branch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out the repository code
    - name: Checkout repository
      uses: actions/checkout@v6

    # Step 2: Set up the desired Node.js version
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22' # Change to your project's Node version
        cache: 'npm'       # Caches npm dependencies for faster future runs

    # Step 3: Clean install dependencies based on package-lock.json
    - name: Install dependencies
      run: npm ci

    # Step 4: Run the test suite
    - name: Run tests
      run: npm test